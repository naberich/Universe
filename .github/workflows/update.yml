name: Update Universe Data

on:
  schedule:
    # 每天北京时间 09:00 和 20:00（UTC 01:00 / 12:00）
    - cron: "0 1,12 * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Fetch RSS + AI Brief
        env:
          # 通用：填任意厂商的 key；AI_PROVIDER 不填会自动识别
          AI_KEY: ${{ secrets.AI_KEY }}
          AI_PROVIDER: ${{ vars.AI_PROVIDER }}
          AI_MODEL: ${{ vars.AI_MODEL }}
          # 向后兼容旧 Secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          TRANSLATE_NEWS: "1"
        working-directory: scripts
        run: node fetch.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "universe-bot"
          git config user.email "universe-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi

name: Update Universe Data

on:
  schedule:
    # 每小时第 17 分（错开整点，降低 API 压力）
    - cron: "17 * * * *"
  workflow_dispatch:  # 允许手动触发

permissions:
  contents: write

concurrency:
  group: update-data
  cancel-in-progress: false

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: scripts/package-lock.json

      - name: Install deps
        working-directory: scripts
        run: npm ci

      - name: Fetch RSS + AI Brief
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        working-directory: scripts
        run: node fetch.mjs

      - name: Commit & push if changed
        run: |
          git config user.name "universe-bot"
          git config user.email "universe-bot@users.noreply.github.com"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes."
          else
            git commit -m "chore(data): auto-update $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
